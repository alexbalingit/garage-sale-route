<style>

  body{margin:0;background:var(--bg);color:var(--ink);

  /* home bar */

  .homebar button{background:none;border:none;color:var(--gold);font-weight:700;font-size:13px;cursor:pointer;padding:2px 2px;font-family:inherit}

  .toggle button{flex:1 1 0;padding:11px 6px;border:none;border-radius:9px;background:transparent;
    color:var(--muted);font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;line-height:1.1;
    transition:background .18s ease,color .18s ease,box-shadow .18s ease}

  .day .dd{font-size:16px;font-weight:700;color:var(--ink);line-height:1.1;font-variant-numeric:tabular-nums}

  .day-empty{margin:8px 18px 0;color:var(--muted);font-size:13px;font-style:italic}

  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;
    margin:12px 18px;padding:14px 14px 12px;
    box-shadow:0 1px 2px rgba(28,26,23,.05),0 6px 18px rgba(28,26,23,.05);
    transition:box-shadow .2s ease,border-color .2s ease}

  .addr{font-size:14px;font-weight:600;margin:0 0 8px}
  .addr .approx{font-weight:600;color:var(--flag);font-size:12px}
  .items{font-size:13.5px;color:#3a352e;margin:0 0 10px}
  .tags{display:flex;flex-wrap:wrap;gap:5px;margin:0 0 12px}
  .tag{font-size:11px;padding:2px 8px;border-radius:6px;background:#F1EADC;color:#7a6f5c;font-weight:600}
  .btns{display:flex;gap:7px;flex-wrap:wrap}

  .cal{background:var(--gold);color:#fff}
  .fb{background:#EDE6D9;color:var(--ink)}

  .card{position:relative}
  .card h2{padding-right:40px}
  .sel-toggle{position:absolute;top:12px;right:12px;width:30px;height:30px;border-radius:50%;
    border:2px solid var(--line);background:#fff;cursor:pointer;display:flex;align-items:center;
    justify-content:center;font-size:16px;font-weight:800;line-height:1;color:var(--muted);padding:0;

  .card.sel{border-color:var(--gold);box-shadow:0 0 0 2px rgba(184,137,59,.30),0 6px 18px rgba(184,137,59,.14)}

  .selbar .clr2{color:#d8cfbe;font-size:13px;background:none;border:none;cursor:pointer;font-weight:600;padding:8px}
  body.has-sel{padding-bottom:92px}
  .empty{margin:24px 18px;padding:22px;text-align:center;color:var(--muted);
    background:var(--card);border:1px dashed var(--line);border-radius:14px;display:none}
  .leaflet-popup-content{font-family:inherit;font-size:13px;margin:10px 12px}
  .leaflet-popup-content b{font-size:13.5px}
  .leaflet-popup-content a{color:var(--gold);font-weight:700}
  footer{margin:26px 18px 0;font-size:12px;color:var(--muted)}
</style>
</head>

/* ---------- home base (user-settable, persisted) ---------- */
var HOME_KEY='gsr_home_v1';
var DEFAULT_HOME={label:"Culleoka, TN 38451", q:"Culleoka,TN+38451", lat:35.4548, lon:-86.9036};
function loadHome(){try{var r=localStorage.getItem(HOME_KEY); if(r){var h=JSON.parse(r); if(h&&h.lat&&h.lon&&h.q)return h;}}catch(e){} return DEFAULT_HOME;}
function saveHome(h){try{localStorage.setItem(HOME_KEY,JSON.stringify(h));}catch(e){}}
var home=loadHome();
var HOME=[home.lat,home.lon];
var HOME_Q=home.q;
function driveMinFromHome(lat,lon){
  var R=3959, toR=Math.PI/180;
  var dLat=(lat-HOME[0])*toR, dLon=(lon-HOME[1])*toR;
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(HOME[0]*toR)*Math.cos(lat*toR)*Math.sin(dLon/2)*Math.sin(dLon/2);
  var mi=R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
  return Math.max(1,Math.round(mi*1.3/45*60)); // road factor 1.3, ~45mph
}
function scoreSale(s){ return s.affluence + (s.type==="ESTATE"?12:0) + (s.type==="MULTI-FAMILY"||s.type==="NEIGHBORHOOD"?8:0) - Math.max(0,(s.drive-30))*0.5; }
function recomputeDrives(){ sales.forEach(function(s){ s.drive=driveMinFromHome(s.lat,s.lon); s.score=scoreSale(s); }); }

/* ---------- date helpers (runtime-aware so the page self-corrects) ---------- */
function iso(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function parseISO(s){var p=s.split("-");return new Date(+p[0],+p[1]-1,+p[2]);}
var DOW=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"], MON=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
var TODAY=new Date(); TODAY.setHours(0,0,0,0);
var TODAY_ISO=iso(TODAY);
// window = today .. today+7
var WINDOW=[]; for(var i=0;i<=7;i++){var d=new Date(TODAY);d.setDate(d.getDate()+i);WINDOW.push(iso(d));}
// weekend = the Fri/Sat/Sun that fall inside the window
var WEEKEND=WINDOW.filter(function(s){var dw=parseISO(s).getDay();return dw===5||dw===6||dw===0;});

function dayLabel(isoStr){var d=parseISO(isoStr);var base=DOW[d.getDay()]+", "+MON[d.getMonth()]+" "+d.getDate();
  if(isoStr===TODAY_ISO)return "Today · "+base;
  var t1=new Date(TODAY);t1.setDate(t1.getDate()+1);if(isoStr===iso(t1))return "Tomorrow · "+base;
  return base;}

function txt(html){var d=document.createElement('div');d.innerHTML=html;return (d.textContent||'').toLowerCase();}
sales.forEach(function(s){ s.hay=(s.name+' '+s.type+' '+s.addr+' '+txt(s.items)+' '+s.cats.join(' ')).toLowerCase(); });
recomputeDrives();

function salesOn(isoStr){return sales.filter(function(s){return s.dates.indexOf(isoStr)>=0;})
  .sort(function(a,b){return b.score-a.score;});}
function countOn(isoStr){return salesOn(isoStr).length;}

function nav(s){return "https://www.google.com/maps/dir/?api=1&destination="+s.q;}
function gcal(s,isoStr){var dk=isoStr.replace(/-/g,"");
  return "https://calendar.google.com/calendar/render?action=TEMPLATE"
    +"&text="+encodeURIComponent("Trove: "+s.name)
    +"&dates="+dk+"T"+s.start+"/"+dk+"T"+s.end+"&ctz="+TZ
    +"&location="+encodeURIComponent(s.addr)
    +"&details="+encodeURIComponent(txt(s.items)+"\n\n"+nav(s)+"\n"+s.link);}
function titleCase(t){return t.replace(/\b\w/g,function(c){return c.toUpperCase();});}
function routeUrl(list){if(!list.length)return "#";
  var qs=list.map(function(s){return s.q;});
  var dest=qs[qs.length-1], wp=qs.slice(0,-1).join('%7C');
  var u="https://www.google.com/maps/dir/?api=1&origin="+HOME_Q+"&destination="+(qs.length>1?dest:HOME_Q)+"&travelmode=driving";
  if(qs.length>1&&wp)u+="&waypoints="+wp; else u+="&waypoints="+qs[0];
  return u;}

/* ---------- map ---------- */
var map=L.map('map',{scrollWheelZoom:false});
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:19,subdomains:'abcd',attribution:'© OpenStreetMap © CARTO'}).addTo(map);
function pinIcon(n,color){return L.divIcon({className:'',html:'<div class="pin" style="background:'+color+'"><span>'+n+'</span></div>',iconSize:[26,26],iconAnchor:[13,26],popupAnchor:[0,-24]});}
sales.forEach(function(s){
  s.marker=L.marker([s.lat,s.lon],{icon:pinIcon(s.id, s.star?GOLD:INK)});
  s.marker.bindPopup('<b>'+s.name+'</b><br>'+s.addr+(s.approx?' <i>(approx.)</i>':'')+'<br><a href="'+nav(s)+'">Navigate →</a>');
});
var HOME_SVG='<svg width="12" height="12" viewBox="0 -960 960 960" fill="#fff" style="display:block"><path d="M240-200h120v-240h240v240h120v-360L480-740 240-560v360Zm-80 80v-480l320-240 320 240v480H520v-240h-80v240H160Z"/></svg>';
var hm=L.marker(HOME,{icon:L.divIcon({className:'',html:'<div class="pin" style="background:'+INK+'"><span>'+HOME_SVG+'</span></div>',iconSize:[26,26],iconAnchor:[13,26],popupAnchor:[0,-24]})}).addTo(map);
hm.bindPopup('<b>Home — '+home.label+'</b>');

/* ---------- state ---------- */
var view='today', selectedDay=null, activeCat='all';
function activeDays(){
  if(view==='today')return [TODAY_ISO];
  if(view==='weekend')return WEEKEND;
  return selectedDay?[selectedDay]:WINDOW;
}

/* ---------- view toggle ---------- */
var toggleEl=document.getElementById('toggle');
function countView(v){
  var days = v==='today'?[TODAY_ISO]:(v==='weekend'?WEEKEND:WINDOW);
  var ids={}; days.forEach(function(d){salesOn(d).forEach(function(s){ids[s.id]=1;});});
  return Object.keys(ids).length;
}
document.getElementById('n-today').textContent=countView('today')+' open';
document.getElementById('n-weekend').textContent=countView('weekend')+' sales';
document.getElementById('n-week').textContent=countView('week')+' sales';
[].forEach.call(toggleEl.children,function(b){
  if(b.dataset.view===view)b.classList.add('on');
  b.onclick=function(){view=b.dataset.view; selectedDay=null;
    [].forEach.call(toggleEl.children,function(x){x.classList.remove('on');}); b.classList.add('on');
    buildStrip(); render();};
});

/* ---------- day strip ---------- */
var stripEl=document.getElementById('strip');
function buildStrip(){
  stripEl.innerHTML='';
  WINDOW.forEach(function(isoStr){
    var d=parseISO(isoStr), c=countOn(isoStr);
    var el=document.createElement('div');
    el.className='day'+(c?'':' empty')+(isoStr===TODAY_ISO?' today':'')+(isoStr===selectedDay?' on':'');
    el.innerHTML='<div class="dn">'+DOW[d.getDay()]+'</div><div class="dd">'+d.getDate()+'</div>'
      +'<div class="dc">'+(c?c+(c===1?' sale':' sales'):'—')+'</div>';
    el.onclick=function(){
      if(!c)return;
      view='week';
      selectedDay=(selectedDay===isoStr?null:isoStr);
      [].forEach.call(toggleEl.children,function(x){x.classList.toggle('on',x.dataset.view==='week');});
      buildStrip(); render();
      document.getElementById('cards').scrollIntoView({behavior:'smooth',block:'start'});
    };
    stripEl.appendChild(el);
  });
}

/* ---------- render ---------- */
var cardsEl=document.getElementById('cards'), countEl=document.getElementById('count'),
    emptyEl=document.getElementById('empty'), qEl=document.getElementById('q'),
    clrEl=document.getElementById('clr'), routeBtn=document.getElementById('routeBtn'),
    noteEl=document.getElementById('note'), subEl=document.getElementById('sub');

function passesFilter(s){
  var q=qEl.value.trim().toLowerCase();
  return (activeCat==='all'||s.cats.indexOf(activeCat)>=0)&&(q===''||s.hay.indexOf(q)>=0);
}

function render(){
  var days=activeDays();
  var grouped=(view!=='today');
  var q=qEl.value.trim().toLowerCase(); clrEl.style.display=q?'block':'none';
  cardsEl.innerHTML='';
  var visibleIds={}, daysWithSales=0;

  subEl.textContent = view==='today'
    ? dayLabel(TODAY_ISO)+' — what’s open right now'
    : (view==='weekend' ? 'This weekend — '+WEEKEND.map(function(d){return DOW[parseISO(d).getDay()];}).join(' · ')
      : (selectedDay? dayLabel(selectedDay)+' — single day' : 'Next 7 days — plan your hunt'));

  // pass 1 — collect what's visible, then rank it ONCE (stop order, best first)
  var dayLists={};
  days.forEach(function(isoStr){
    var open=salesOn(isoStr).filter(passesFilter);
    dayLists[isoStr]=open;
    open.forEach(function(s){visibleIds[s.id]=s;});
  });
  var routeList=[]; Object.keys(visibleIds).forEach(function(k){routeList.push(visibleIds[k]);});
  routeList.sort(function(a,b){return b.score-a.score;});
  var rank={}; routeList.forEach(function(s,i){rank[s.id]=i+1;});

  // pass 2 — render; every card is numbered by its stop rank (matches map pins + route order)
  days.forEach(function(isoStr){
    var open=dayLists[isoStr];
    if(grouped){
      var sec=document.createElement('div'); sec.className='day-sec';
      var head=document.createElement('div'); head.className='day-head';
      head.innerHTML='<div class="dh-l">'+dayLabel(isoStr).replace('Today · ','Today — ').replace('Tomorrow · ','Tomorrow — ')+'</div>'
        +'<div class="dh-r">'+(open.length?open.length+(open.length===1?' sale':' sales'):'—')+'</div>';
      sec.appendChild(head); cardsEl.appendChild(sec);
      if(!open.length){
        var e=document.createElement('div'); e.className='day-empty';
        e.textContent=(q||activeCat!=='all')?'No matching sales this day.':'Nothing posted yet — re-check closer to the date.';
        cardsEl.appendChild(e); return;
      }
      daysWithSales++;
      if(open.length>1) addDayRoute(open);
      open.forEach(function(s){renderCard(s,isoStr,rank[s.id]);});
    } else {
      open.forEach(function(s){renderCard(s,isoStr,rank[s.id]);});
    }
  });

  // map: show only currently-visible sales, pins re-numbered by the SAME rank
  var bounds=[HOME];
  sales.forEach(function(s){
    if(visibleIds[s.id]){ s.marker.setIcon(pinIcon(rank[s.id], s.star?GOLD:INK));
      if(!map.hasLayer(s.marker))s.marker.addTo(map); bounds.push([s.lat,s.lon]); }
    else if(map.hasLayer(s.marker)) map.removeLayer(s.marker);
  });
  if(bounds.length>1)map.fitBounds(bounds,{padding:[34,34],maxZoom:12}); else map.setView(HOME,10);

  // route button: same ranked list
  routeBtn.href=routeUrl(routeList);
  routeBtn.style.display=routeList.length>1?'block':(routeList.length===1?'block':'none');
  routeBtn.textContent=view==='today'?'Open today’s route in Google Maps'
    :'Route all '+routeList.length+' visible stop'+(routeList.length===1?'':'s');

  // count + empty
  var uniq=routeList.length;
  var scope=view==='today'?'today':(view==='weekend'?'this weekend':(selectedDay?dayLabel(selectedDay).toLowerCase():'the next 7 days'));
  var label=(activeCat==='all'?'':' in '+titleCase(activeCat))+(q?' matching “'+qEl.value.trim()+'”':'');
  countEl.textContent=uniq+' sale'+(uniq===1?'':'s')+label
    +(grouped&&!selectedDay?' across '+daysWithSales+' day'+(daysWithSales===1?'':'s'):'')+' · '+scope
    +(uniq>1?' · numbered in stop order, best first':'');
  emptyEl.style.display=uniq?'none':'block';
  emptyEl.textContent='No sales'+label+' for '+scope+'. Try another term, switch the view, or check back — the page refreshes daily.';

  // note bar
  noteEl.innerHTML=noteFor();

  // keep the selected-route bar in sync after every re-render
  updateSelBar();
}

function addDayRoute(open){
  if(open.length<1)return;
  var a=document.createElement('a'); a.className='day-route ico ico-route'; a.target='_blank'; a.rel='noopener';
  a.href=routeUrl(open.slice().sort(function(x,y){return y.score-x.score;}));
  a.textContent=open.length>1?'Route these '+open.length:'Navigate';
  cardsEl.appendChild(a);
}

function renderCard(s,isoStr,n){
  var c=document.createElement('div'); c.className='card'+(selected.has(s.id)?' sel':''); c.dataset.id=s.id;
  var numCls=s.star?'num':'num ink';
  var badge=s.type==="MULTI-FAMILY"?'<span class="badge nb">NEIGHBORHOOD</span>':'<span class="badge">'+s.type+'</span>';
  var tags=s.cats.map(function(t){return '<span class="tag">'+titleCase(t)+'</span>';}).join('');
  c.innerHTML=
    '<h2><span class="'+numCls+'" title="Stop order — best first">'+(n||s.id)+'</span>'+s.name+(s.star?' <span class="star">★</span>':'')+'</h2>'
    +'<p class="meta">'+badge+s.time+'</p>'
    +'<p class="addr pin-ico">'+s.addr+(s.approx?' <span class="approx">— exact address releases day-of</span>':'')+'</p>'
    +'<p class="items">'+s.items+'</p>'
    +'<div class="tags">'+tags+'</div>'
    +'<div class="btns">'
    +'<a class="map-btn" href="'+nav(s)+'" target="_blank" rel="noopener">Navigate</a>'
    +'<a class="cal" href="'+gcal(s,isoStr)+'" target="_blank" rel="noopener">+ Calendar</a>'
    +'<a class="fb" href="'+s.link+'" target="_blank" rel="noopener">Listing</a>'
    +'</div>';
  var st=document.createElement('button'); st.className='sel-toggle'; st.type='button';
  st.setAttribute('aria-label','Add to route'); st.title='Add to route';
  st.textContent=selected.has(s.id)?'✓':'+';
  st.onclick=function(ev){ev.stopPropagation(); toggleSel(s.id);};
  c.appendChild(st);
  cardsEl.appendChild(c);
}

function noteFor(){
  if(view==='today'){
    var t=salesOn(TODAY_ISO);
    if(!t.length)return '<b>Nothing open today.</b> Weekdays are quiet in the corridor — tap <b>Weekend</b> or <b>Next 7 Days</b> to plan ahead.';
    return '<b>'+t.length+' open today.</b> Today (Thu 7/2): the <b>Ethridge</b> country yard sale at <b>102 Mount Horeb Rd</b>, from 7am — tools, cast iron, Fire King, vintage glass, collector plates. Tomorrow the July 4th weekend opens up with <b>9 sales</b>.';
  }
  if(view==='weekend')return '<b>July 4th weekend — the corridor filled in.</b> <b>Fri 7/3</b> is the volume day (9 sales); Sat 7/4 has 6. Marquees: the <b>Brentwood</b> estate (Fri &amp; Sun, the week’s most affluent zip) and the new <b>Franklin</b> moving sale at 1308 Lewisburg Pike (7am start). Closest to home: <b>Glennridge Rd Columbia</b>, <b>Chapel Hill</b>, <b>Lewisburg</b>. Some sellers skip the holiday — confirm via Listing before driving.';
  return '<b>Plan the week.</b> Volume clusters <b>Fri 7/3</b> (9 sales) and <b>Sat 7/4</b> (6). Best for your thesis: the <b>Brentwood</b> estate (Fri &amp; Sun), the <b>Franklin</b> Lewisburg Pike moving sale (Fri–Sat), and the <b>Steeplechase</b> vintage house (Fri–Sun). Next Thu 7/9: <b>Ragsdale Rd Columbia</b> + <b>Crieve Hall</b> open. Several addresses release the day before — the Listing link is how you confirm.';
}

/* ---------- select-to-route ---------- */
var SELKEY='gsr_selected_v1';
var selected=new Set();
try{var raw=localStorage.getItem(SELKEY); if(raw)JSON.parse(raw).forEach(function(x){selected.add(+x);});}catch(e){}
function byId(id){for(var i=0;i<sales.length;i++)if(sales[i].id===id)return sales[i];return null;}
function persistSel(){try{localStorage.setItem(SELKEY,JSON.stringify(Array.from(selected)));}catch(e){}}
function toggleSel(id){ if(selected.has(id))selected.delete(id); else selected.add(id); persistSel(); reflectSel(); updateSelBar(); }
function reflectSel(){
  [].forEach.call(cardsEl.querySelectorAll('.card'),function(c){
    var on=selected.has(+c.dataset.id); c.classList.toggle('sel',on);
    var t=c.querySelector('.sel-toggle'); if(t)t.textContent=on?'✓':'+';
  });
}
function selSalesRanked(){
  var arr=[]; selected.forEach(function(id){var s=byId(id); if(s)arr.push(s);});
  arr.sort(function(a,b){return b.score-a.score;}); return arr;
}
var selbarEl=document.getElementById('selbar'), selGoEl=document.getElementById('selGo');
function updateSelBar(){
  var arr=selSalesRanked();
  if(!arr.length){ selbarEl.classList.remove('on'); document.body.classList.remove('has-sel'); return; }
  selbarEl.classList.add('on'); document.body.classList.add('has-sel');
  selGoEl.href=routeUrl(arr);
  selGoEl.textContent='Route '+arr.length+' selected stop'+(arr.length===1?'':'s');
}
document.getElementById('selClr').onclick=function(){ selected.clear(); persistSel(); reflectSel(); updateSelBar(); };

/* ---------- category chips ---------- */
var cats=['all']; sales.forEach(function(s){s.cats.forEach(function(c){if(cats.indexOf(c)<0)cats.push(c);});});
var chipsEl=document.getElementById('chips');
cats.forEach(function(c){
  var b=document.createElement('button'); b.className='chip'+(c==='all'?' on':''); b.textContent=c==='all'?'All':titleCase(c);
  b.onclick=function(){activeCat=c;[].forEach.call(chipsEl.children,function(x){x.classList.remove('on');});b.classList.add('on');render();};
  chipsEl.appendChild(b);
});

document.getElementById('foot').innerHTML=
  'Sources reached: gsalr.com (Columbia feed, primary), Craigslist (35 mi), EstateSales.NET (primary estate feed), EstateSales.org (cross-check), Facebook Marketplace (logged-in, click-into-listing), and the Bleu Estates registry check (nothing posted). Full pull 2026-07-02 (Thu). '
  +'July 4th holiday weekend — the corridor has filled in: 9 sales open Friday. Several estate addresses release Thu 9am or the day before — tap the listing for the exact pin. '
  +'Some Facebook stops show only the city, not the exact address — message the seller to confirm. Sales can cancel without updating the listing. '
  +'Always tap <b>Listing</b> to confirm before the drive.';

/* ---------- home-address picker ---------- */
var homeLabelEl=document.getElementById('homeLabel'),
    homeEditorEl=document.getElementById('homeEditor'),
    homeInputEl=document.getElementById('homeInput'),
    homeNoteEl=document.getElementById('homeNote'),
    homeSetEl=document.getElementById('homeSet'),
    homeEditBtn=document.getElementById('homeEdit');
function updateHomeUI(){ homeLabelEl.innerHTML='Home: <b>'+home.label+'</b>'; }
function showHomeEditor(show){ homeEditorEl.hidden=!show; homeEditBtn.style.display=show?'none':'';
  if(show){ homeNoteEl.textContent=''; homeInputEl.value=''; homeInputEl.focus(); } }
function applyHome(h){
  home=h; HOME=[h.lat,h.lon]; HOME_Q=h.q; saveHome(h);
  if(hm){hm.setLatLng(HOME); hm.setPopupContent('<b>Home — '+h.label+'</b>');}
  recomputeDrives(); updateHomeUI(); render(); showHomeEditor(false);
}
homeEditBtn.onclick=function(){ showHomeEditor(true); };
document.getElementById('homeCancel').onclick=function(){ showHomeEditor(false); };
homeSetEl.onclick=function(){
  var v=homeInputEl.value.trim(); if(!v){ homeInputEl.focus(); return; }
  homeNoteEl.textContent=''; homeSetEl.textContent='Finding…'; homeSetEl.disabled=true;
  var q=encodeURIComponent(v).replace(/%20/g,'+');
  fetch('https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=us&q='+encodeURIComponent(v),{headers:{'Accept':'application/json'}})
    .then(function(r){ return r.json(); })
    .then(function(j){
      homeSetEl.textContent='Set home'; homeSetEl.disabled=false;
      if(j&&j.length){ applyHome({label:v, q:q, lat:parseFloat(j[0].lat), lon:parseFloat(j[0].lon)}); }
      else { homeNoteEl.textContent='Couldn’t find that — try a ZIP or “City, ST”.'; }
    })
    .catch(function(){
      homeSetEl.textContent='Set home'; homeSetEl.disabled=false;
      homeNoteEl.textContent='Couldn’t reach the map service — check connection and try again.';
    });
};
homeInputEl.addEventListener('keydown',function(e){ if(e.key==='Enter')homeSetEl.click(); });
updateHomeUI();

buildStrip();
render();
</script>
</body>
</html>
